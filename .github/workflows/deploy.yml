name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allows running manually from the Actions tab.
  workflow_dispatch:

# Required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Run only one Pages deploy at a time. Don't cancel in-progress runs —
# we want every push to actually finish publishing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `--legacy-peer-deps` matches the local install (peer-dep conflict
        # between TypeScript and one of the SvelteKit-related packages).
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # SvelteKit's adapter-static writes to /build by default.
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
